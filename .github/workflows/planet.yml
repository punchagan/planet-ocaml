name: Build OCaml Planet feed

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build dir
        uses: actions/cache@v4
        with:
          path: _build
          key: build-dir-${{ runner.os }}-${{ hashFiles('dune-project', 'dune.lock/lock.dune') }}

      - name: Set up dune and build
        uses: ocaml-dune/setup-dune@v1
        with:
          steps: "install-dune install-depexts build"

      - name: Generate feed
        run: |
          mkdir -p web
          dune exec -- bin/main.exe \
            --output web/feed.xml \
            --title "OCaml Planet" \
            --id "https://punchagan.github.io/planet-ocaml/feed.xml"

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
